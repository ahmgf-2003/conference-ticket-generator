<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <!-- displays site properly based on user's device -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="./assets/images/favicon-32x32.png"
        />
        <!-- Render all elements normally -->
        <link rel="stylesheet" href="assets/css/normalize.css" />
        <!-- Main CSS file -->
        <link rel="stylesheet" href="assets/css/main.css" />
        <title>Conference ticket generator</title>
        <!-- Main JS file -->
        <script src="assets/js/main.js" defer></script>
    </head>
    <body>
        <!-- Start background images -->
        <div class="background-images" role="img">
            <img class="pattern lines" src="assets/images/pattern-lines.svg" />
            <img
                class="pattern line-top"
                src="assets/images/pattern-squiggly-line-top.svg"
            />
            <picture class="pattern line-bottom">
                <source
                    media="(min-width: 992px)"
                    srcset="
                        assets/images/pattern-squiggly-line-bottom-desktop.svg
                    "
                />
                <img
                    src="assets/images/pattern-squiggly-line-bottom-mobile-tablet.svg"
                />
            </picture>
        </div>
        <!-- End background images -->
        <!-- Start header -->
        <header class="header">
            <div class="container">
                <img
                    src="assets/images/logo-full.svg"
                    decoding="async"
                    alt="logo"
                />
                <h1>Your Journey to Coding Conf 2025 Starts Here!</h1>
                <p>
                    Secure your spot at next year's biggest coding conference.
                </p>
            </div>
        </header>
        <!-- End header -->
        <section id="form" class="form hidden">
            <div class="container">
                <form method="post" enctype="multipart/form-data">
                    <div class="form-input-image">
                        <label for="img"> Upload Avatar </label>
                        <div class="image-input">
                            <img
                                src="assets/images/icon-upload.svg"
                                decoding="async"
                                alt="Upload icon"
                            />
                            <span>Drag and drop or click to upload</span>
                            <input id="img" type="file" name="user-img" />
                            <div class="buttons hidden">
                                <button type="button">Remove image</button>
                                <button type="button">Change image</button>
                            </div>
                        </div>
                        <span class="note">
                            <svg
                                xmlns="http://www.w3.org/2000/svg"
                                width="16"
                                height="16"
                                fill="none"
                                viewBox="0 0 16 16"
                            >
                                <path
                                    stroke="#D1D0D5"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    d="M2 8a6 6 0 1 0 12 0A6 6 0 0 0 2 8Z"
                                />
                                <path
                                    fill="#D1D0D5"
                                    d="M8.004 10.462V7.596ZM8 5.57v-.042Z"
                                />
                                <path
                                    stroke="#D1D0D5"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    d="M8.004 10.462V7.596M8 5.569v-.042"
                                />
                            </svg>
                            Upload your photo (JPG or PNG, max size: 3MB).
                        </span>
                    </div>
                    <div class="form-input">
                        <label for="name"> Full Name </label>
                        <input id="name" type="text" name="user-name" />
                    </div>
                    <div class="form-input">
                        <label for="email"> Email Address </label>
                        <input
                            id="email"
                            type="email"
                            name="user-email"
                            placeholder="example@email.com"
                        />
                    </div>
                    <div class="form-input">
                        <label for="github"> GitHub Username </label>
                        <input
                            id="github"
                            type="text"
                            name="user-github"
                            placeholder="@yourusername"
                        />
                    </div>
                    <div class="form-submit">
                        <input
                            class="btn"
                            type="submit"
                            value="Generate My Ticket"
                        />
                    </div>
                </form>
            </div>
        </section>
        <section id="ticket" class="ticket hidden">
            <div class="container">
                <div class="ticket-card">
                    <div class="ticket-heading">
                        <h2>
                            <img src="assets/images/logo-mark.svg" alt="logo" />
                            Coding Conf
                        </h2>
                        <p>Jan 31, 2025 / Online</p>
                    </div>
                    <figure class="ticket-user-info">
                        <img alt="Ticket user" />
                        <figcaption>
                            <h3></h3>
                            <p></p>
                        </figcaption>
                    </figure>
                </div>
                <button class="btn">generate new ticket</button>
            </div>
        </section>
    </body>
</html>
